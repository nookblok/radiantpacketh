<!-- HERO SECTION - Style mirip Lobster NFT -->
<section style="position: relative; min-height: 100vh; background: #0a001f;

    <!-- Background subtle neon -->

    <!-- Main Banner Image (full width feel) -->

         alt="Radiant Pack Banner"

                width: auto; height: auto; 
                filter: drop-shadow(0 0 60px rgba(255, 0, 255, 0.6)); 
                border-radius: 12px; margin-bottom: 30px;">

    <!-- Overlay Content -->
    <div style="position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); 
                z-index: 3; width: 90%; max-width: 700px;">

        <!-- Logo -->

             alt="Radiant Pack Logo" 
             style="width: 210px; margin-bottom: 20px; 
                    filter: drop-shadow(0 0 25px #00ffff);">

        <h1 style="font-size: 3.8rem; margin: 0 0 15px 0; letter-spacing: -2px;
                   text-shadow: 0 0 40px #ff00ff, 0 0 70px #00ffff;">

        <p style="font-size: 1.65rem; margin: 0 0 35px 0; 
                  text-shadow: 0 0 20px #000;">

        <p style="font-size: 1.3rem; margin-bottom: 40px; opacity: 0.95;">
            Free Mint on Ethereum • Limited Supply: 100
        </p>

        <!-- Buttons - mirip Lobster NFT style -->
        <div style="display: flex; gap: 18px; justify-content: center; flex-wrap: wrap;">
            
            <a href="https://x.com/radiantpacketh" 
               target="_blank"
               style="background: rgba(0, 0, 0, 0.85); color: white; 
                      padding: 16px 38px; border-radius: 9999px; 
                      font-size: 1.3rem; text-decoration: none; 
                      border: 2px solid #1DA1F2; 
                      box-shadow: 0 0 30px #1DA1F2; font-weight: 600;">
                Follow @radiantpacketh
            </a>

            <a href="#" 
               style="background: linear-gradient(90deg, #ff00ff, #00ffff);

                      padding: 16px 46px; border-radius: 9999px; 
                      font-size: 1.3rem; text-decoration: none; 
                      box-shadow: 0 0 40px #ff00ff; 
                      cursor: not-allowed; opacity: 0.9;">
