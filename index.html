<!-- HERO SECTION - Improved Clean Layout -->
<section style="position: relative; min-height: 100vh; background: #0a001f;

                padding: 20px 15px; overflow: hidden;">

    <!-- Banner utama (radiantpack1.png) - lebih besar & clean -->

         alt="Radiant Pack Banner" 
         style="position: relative; z-index: 2;

                height: auto;

                margin-bottom: 30px; 
                filter: drop-shadow(0 0 55px #ff00ff); 
                border-radius: 12px;">

         style="width: 195px; margin-bottom: 20px; z-index: 2;

        Free Mint on Ethereum • Limited Supply: 100
    </p>

    <!-- Tombol lebih besar & stylish -->
    <div style="display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; z-index: 2;">
        
        <a href="https://x.com/radiantpacketh"

           style="background: #000; color: white;

                  font-size: 1.3rem; text-decoration: none; 
                  border: 2.5px solid #1DA1F2; 
                  box-shadow: 0 0 30px #1DA1F2;">
            Follow @radiantpacketh

        <a href="#" 
           style="background: linear-gradient(90deg, #ff00ff, #00ffff);
