<!-- HERO SECTION - Keith Haring Inspired -->
<section style="position: relative; min-height: 90vh; 
                background: linear-gradient(135deg, #0a001f, #1a0033, #2a0044); 
                background-size: 300% 300%;
                animation: radiantGradient 18s ease infinite;
                display: flex; align-items: center; justify-content: center; 
                text-align: center; color: white; overflow: hidden;">

    <!-- Subtle Keith Haring style neon pattern -->
    <div style="position: absolute; inset: 0; 
                background-image: 
                    radial-gradient(circle at 25% 30%, rgba(255, 0, 255, 0.18) 3px, transparent 4px),
                    radial-gradient(circle at 75% 70%, rgba(0, 255, 255, 0.18) 3px, transparent 4px),
                    radial-gradient(circle at 40% 80%, rgba(255, 255, 0, 0.15) 3px, transparent 4px);
                background-size: 90px 90px;
                pointer-events: none; z-index: 1; opacity: 0.7;"></div>

    <!-- Main Banner Image -->
    <div style="position: relative; z-index: 2; width: 100%; max-width: 1100px; 
                background-image: url('/images/radiantpack1.png'); 
                background-size: contain; background-position: center; 
                background-repeat: no-repeat; height: 68vh; 
                filter: drop-shadow(0 0 45px #ff00ff) brightness(1.15);">
    </div>

    <!-- Dark + Neon Overlay -->
    <div style="position: absolute; inset: 0; 
                background: linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(10,0,35,0.85)); 
                z-index: 3;"></div>

    <!-- Content -->
    <div style="position: relative; z-index: 4; padding: 20px; max-width: 90%;">
        
        <img src="/images/radiantpack2.png" 
             alt="Radiant Pack Logo" 
             style="width: 190px; margin-bottom: 25px; 
                    filter: drop-shadow(0 0 30px #00ffff) brightness(1.2);">

        <h1 style="font-size: 3.9rem; margin: 0 0 15px 0; letter-spacing: -2px;
                   text-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff, 0 0 90px #ffff00;">
            RADIANT PACK ETH
        </h1>
        
        <p style="font-size: 1.65rem; margin: 10px 0 35px; 
                  text-shadow: 0 0 20px #000;">
            100 Glowing Neon Dancing Cats & Creatures
        </p>

        <p style="font-size: 1.35rem; margin-bottom: 45px; opacity: 0.95;">
            Inspired by Keith Haring • Free Mint on Ethereum • Limited Supply: 100
        </p>

        <!-- Buttons -->
        <div style="display: flex; gap: 18px; justify-content: center; flex-wrap: wrap;">
            
            <!-- Follow on X -->
            <a href="https://x.com/radiantpacketh" 
               target="_blank" 
               style="background: #000; color: white; 
                      padding: 15px 36px; border-radius: 50px; 
                      font-size: 1.3rem; text-decoration: none; 
                      border: 3px solid #1DA1F2; 
                      box-shadow: 0 0 25px #1DA1F2; font-weight: 500;">
                Follow @radiantpacketh
            </a>

            <!-- Coming Soon -->
            <a href="#" 
               style="background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00); 
                      color: #000; font-weight: bold;
                      padding: 15px 48px; border-radius: 50px; 
                      font-size: 1.3rem; text-decoration: none; 
                      box-shadow: 0 0 40px #ff00ff; 
                      opacity: 0.85; cursor: not-allowed; pointer-events: none;">
                Coming Soon
            </a>
        </div>
    </div>
</section>

<!-- Animation for glowing background -->
<style>
@keyframes radiantGradient {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
</style>
