<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radiant Pack - 100 Exclusive NFT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
      line-height: 1.6;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      padding: 40px 0;
      border-bottom: 2px solid #22d3ee;
    }
    h1 {
      font-size: 3rem;
      background: linear-gradient(to right, #22d3ee, #a855f7, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero {
      padding: 100px 20px 80px;
      background: linear-gradient(180deg, #0a0a0a, #164e63);
    }
    h2 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    .supply {
      font-size: 1.8rem;
      color: #67e8f9;
      margin: 30px 0;
    }
    button {
      background: #22d3ee;
      color: black;
      border: none;
      padding: 18px 40px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 30px;
    }
    .about {
      padding: 80px 20px;
      background: #111111;
    }
    footer {
      padding: 40px 20px;
      border-top: 1px solid #333;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>RADIANT PACK</h1>
      <p>100 Exclusive Beings on Ethereum</p>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h2>Free Mint Soon</h2>
      <p class="supply">Supply: <strong>100</strong> • Free Mint</p>
      <button onclick="alert('Connect Wallet - Fitur ini akan ditambahkan nanti')">Connect Wallet</button>
    </div>
  </section>

  <section class="about">
    <div class="container">
      <h2>About Radiant Pack</h2>
      <p>A limited collection of 100 unique radiant NFTs on Ethereum.<br>
      Free mint for early community. Each piece has rare traits and future utility.</p>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>© 2026 Radiant Pack • @radiantpacketh on X</p>
    </div>
  </footer>
</body>
</html>
