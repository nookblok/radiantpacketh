      font-size: 17px;
      background: #111;
      color: white;
      border: 2px solid #00ff9d;
      border-radius: 12px;
      margin-bottom: 25px;
      outline: none;
    }
    button {
      padding: 16px 70px;
      font-size: 18px;
      font-weight: bold;
      background: linear-gradient(90deg, #00ff9d, #00cc77);
      color: black;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    button:hover {
      background: linear-gradient(90deg, #00ff9d, #00e68a);
      transform: scale(1.05);
    }
    #result {

      font-size: 20px;

function checkPacklist() {
  const input = document.getElementById("walletAddress").value.trim();
  const result = document.getElementById("result");

  if (input === "") {
    result.innerHTML = "❌ Please enter your wallet address";
    result.style.color = "#ff6666";
    return;
  }

  const address = input.toLowerCase();
  const isWhitelisted = whitelist.some(addr => addr.toLowerCase() === address);

  if (isWhitelisted) {
    result.innerHTML = "✅ Congratulations! Your address is in the Packlist";
    result.style.color = "#00ff9d";
  } else {
    result.innerHTML = "❌ Sorry, your address is not in the Packlist yet";
    result.style.color = "#ff6666";
  }
}
